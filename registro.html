<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <h1 style="text-align:center;">Registrate</h1>
    <br>
    <h2 style="text-align:center;">Formulario de Registro</h2>

    <form action="#" method="post">
        <fieldset>
            <legend>Datos Personales</legend>
            
            <label>Nombre completo:</label><br>
            
            <input type="text" name="nombre" required><br><br>
            <label>Tipo de identificación:</label><br>
            <select name="tipo_identificacion">
                <option value="">Seleccione</option>
                <option value="cc">Cédula</option>
                <option value="ti">Tarjeta de identidad</option>
                <option value="pasaporte">Pasaporte</option>
            </select><br><br>
            
            <label>Número de identificación:</label><br>
            <input type="number" name="identificacion" required><br><br>
            <label>Fecha de nacimiento:</label><br>
            <input type="date" name="fecha_nacimiento"><br><br>
            <label>Edad:</label><br>
            <input type="number" name="edad"><br><br>

            <label>Género:</label><br>
            <input type="radio" name="genero" value="masculino"> Masculino
            <input type="radio" name="genero" value="femenino"> Femenino
            <input type="radio" name="genero" value="otro"> Otro
            <br><br>
        </fieldset>

        <fieldset>
            <legend>Datos de Contacto</legend>
            <label>Correo electrónico:</label><br>
            <input type="email" name="correo"><br><br>
            <label>Número de teléfono:</label><br>
            <input type="tel" name="telefono"><br><br>
            <label>Dirección:</label><br>
            <input type="text" name="direccion"><br><br>
        </fieldset>

        <fieldset>
            <legend>Información adicional</legend>
            <label>Ocupación:</label><br>
            <select name="ocupacion">
                <option value="">Seleccione</option>
                <option value="estudiante">Estudiante</option>
                <option value="empleado">Empleado</option>
                <option value="independiente">Independiente</option>
                <option value="otro">Otro</option>
            </select>

            <br><br>

            <label>Comentarios:</label><br>
            <textarea name="comentarios" rows="4" cols="40" placeholder="Escribe tus comentarios aquí"></textarea>
            <br><br>
        </fieldset>
        <button type="submit">Registrarse</button>
    </form>
</body>
</html>
